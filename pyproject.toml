[project]
name = "lumberjack"
dynamic = ["version"]
description = "AST-driven markdown document splitter"
readme = "README.md"
requires-python = ">=3.13"
dependencies = ["marko>=2.1.0"]

[project.optional-dependencies]
tokenizers = ["tiktoken>=0.9.0"]

[dependency-groups]
dev = ["ruff>=0.15.6"]
test = ["pytest>=8.0.0"]

[project.scripts]
lumberjack = "lumberjack.main:main"

[tool.hatch.version]
source = "vcs"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lumberjack"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "SIM108", # use ternary operator (sometimes less readable)
]

[tool.ruff.lint.isort]
known-first-party = ["lumberjack"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
