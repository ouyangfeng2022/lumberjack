name: Bug report
description: Report something that isn't working as expected
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Before you continue,
        please [search existing issues](https://github.com/ouyangfeng2022/lumberjack/issues?q=is%3Aissue+label%3Abug)
        to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `...`
        2. With input `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Paste error output, stack traces, or unexpected output here.
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Reproducer
      description: A minimal code snippet or command that triggers the bug. Use ``` code fences.
      render: python

  - type: input
    id: lumberjack-version
    attributes:
      label: lumberjack version
      description: Run `uv run lumber --version` or check `pip show lumberjack`.
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 24.04, macOS 14, Windows 11"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install lumberjack?
      options:
        - pip / pipx
        - uv
        - From source (git clone)
        - Docker
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — config, workarounds you tried, related issues.
